# =============================================================================
# DotNetCloud — CI Pipeline
# =============================================================================
# Runs on every push to main and on pull requests.
# Builds the full solution and runs all tests.
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore DotNetCloud.CI.slnf

      - name: Build
        run: dotnet build DotNetCloud.CI.slnf --no-restore --configuration Release

      - name: Test
        run: dotnet test DotNetCloud.CI.slnf --no-build --configuration Release --verbosity normal --settings .runsettings
