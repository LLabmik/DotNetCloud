syntax = "proto3";

option csharp_namespace = "DotNetCloud.Modules.Search.Host.Protos";

package dotnetcloud.search;

// SearchService: gRPC service for the Search module.
// Provides full-text search, indexing, and reindex operations.
service SearchService {
  // Executes a full-text search query.
  rpc Search (SearchRequest) returns (SearchResponse);

  // Adds or updates a document in the search index.
  rpc IndexDocument (IndexDocumentRequest) returns (IndexDocumentResponse);

  // Removes a document from the search index.
  rpc RemoveDocument (RemoveDocumentRequest) returns (RemoveDocumentResponse);

  // Triggers a full reindex for a module.
  rpc ReindexModule (ReindexModuleRequest) returns (ReindexModuleResponse);

  // Returns search index statistics.
  rpc GetIndexStats (GetIndexStatsRequest) returns (IndexStatsResponse);
}

// --- Search ---

message SearchRequest {
  string query_text = 1;
  string module_filter = 2;       // Optional module ID filter
  string entity_type_filter = 3;  // Optional entity type filter
  string user_id = 4;             // Authenticated user for permission scoping
  int32 page = 5;
  int32 page_size = 6;
  string sort_order = 7;          // "Relevance", "DateDesc", "DateAsc"
}

message SearchResponse {
  bool success = 1;
  string error_message = 2;
  repeated SearchResultItemMessage items = 3;
  int32 total_count = 4;
  int32 page = 5;
  int32 page_size = 6;
  map<string, int32> facet_counts = 7;
}

message SearchResultItemMessage {
  string module_id = 1;
  string entity_id = 2;
  string entity_type = 3;
  string title = 4;
  string snippet = 5;
  double relevance_score = 6;
  string updated_at = 7;  // ISO 8601
  map<string, string> metadata = 8;
}

// --- IndexDocument ---

message IndexDocumentRequest {
  string module_id = 1;
  string entity_id = 2;
  string entity_type = 3;
  string title = 4;
  string content = 5;
  string summary = 6;
  string owner_id = 7;
  string organization_id = 8;
  string created_at = 9;    // ISO 8601
  string updated_at = 10;   // ISO 8601
  map<string, string> metadata = 11;
}

message IndexDocumentResponse {
  bool success = 1;
  string error_message = 2;
}

// --- RemoveDocument ---

message RemoveDocumentRequest {
  string module_id = 1;
  string entity_id = 2;
}

message RemoveDocumentResponse {
  bool success = 1;
  string error_message = 2;
}

// --- ReindexModule ---

message ReindexModuleRequest {
  string module_id = 1;
}

message ReindexModuleResponse {
  bool success = 1;
  string error_message = 2;
  string job_id = 3;
}

// --- GetIndexStats ---

message GetIndexStatsRequest {
}

message IndexStatsResponse {
  bool success = 1;
  string error_message = 2;
  int32 total_documents = 3;
  map<string, int32> documents_per_module = 4;
  string last_full_reindex_at = 5;    // ISO 8601 or empty
  string last_incremental_index_at = 6; // ISO 8601 or empty
}
