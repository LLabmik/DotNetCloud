syntax = "proto3";

option csharp_namespace = "DotNetCloud.Modules.Tracks.Host.Protos";

package dotnetcloud.tracks;

// TracksGrpcService: gRPC service for the Tracks module.
// The core server calls these RPCs to interact with the Tracks module.
service TracksGrpcService {
  // Creates a new product.
  rpc CreateProduct (CreateProductRequest) returns (ProductResponse);

  // Gets a product by ID.
  rpc GetProduct (GetProductRequest) returns (ProductResponse);

  // Lists products for a user.
  rpc ListProducts (ListProductsRequest) returns (ListProductsResponse);

  // Creates a new swimlane in a product.
  rpc CreateSwimlane (CreateSwimlaneRequest) returns (SwimlaneResponse);

  // Creates a new work item in a swimlane.
  rpc CreateWorkItem (CreateWorkItemRequest) returns (WorkItemResponse);

  // Gets a work item by ID.
  rpc GetWorkItem (GetWorkItemRequest) returns (WorkItemResponse);

  // Moves a work item to a different swimlane or position.
  rpc MoveWorkItem (MoveWorkItemRequest) returns (WorkItemResponse);

  // Starts a planning poker session for a work item.
  rpc StartPokerSession (StartPokerSessionRequest) returns (PokerSessionResponse);

  // Submits a vote in a poker session.
  rpc SubmitPokerVote (SubmitPokerVoteRequest) returns (PokerSessionResponse);

  // Reveals all votes in a poker session.
  rpc RevealPokerSession (RevealPokerSessionRequest) returns (PokerSessionResponse);

  // Accepts an estimate and completes a poker session.
  rpc AcceptPokerEstimate (AcceptPokerEstimateRequest) returns (PokerSessionResponse);

  // Creates a sprint plan for a product.
  rpc CreateSprintPlan (CreateSprintPlanRequest) returns (SprintPlanResponse);

  // Gets the sprint plan overview for a product.
  rpc GetSprintPlan (GetSprintPlanRequest) returns (SprintPlanResponse);

  // Adjusts a sprint's duration and cascades date changes.
  rpc AdjustSprint (AdjustSprintRequest) returns (SprintPlanResponse);

  // Starts a review session on a product.
  rpc StartReviewSession (StartReviewSessionRequest) returns (ReviewSessionResponse);

  // Gets a review session by ID.
  rpc GetReviewSession (GetReviewSessionRequest) returns (ReviewSessionResponse);

  // Joins an existing review session.
  rpc JoinReviewSession (JoinReviewSessionRequest) returns (ReviewSessionResponse);

  // Sets the current work item in a review session.
  rpc SetReviewCurrentItem (SetReviewCurrentItemRequest) returns (ReviewSessionResponse);

  // Ends a review session.
  rpc EndReviewSession (EndReviewSessionRequest) returns (ReviewSessionResponse);

  // Gets poker vote status (voted/not-voted per participant).
  rpc GetPokerVoteStatus (GetPokerVoteStatusRequest) returns (PokerVoteStatusResponse);

  // Returns all searchable documents for full reindex (streaming).
  rpc GetSearchableDocuments (GetSearchableDocumentsRequest) returns (stream SearchableDocument);

  // Returns a single searchable document by entity ID.
  rpc GetSearchableDocument (GetSearchableDocumentRequest) returns (SearchableDocumentResponse);
}

// --- CreateProduct ---

message CreateProductRequest {
  string user_id = 1;
  string title = 2;
  string description = 3;
  string color = 4;
  string mode = 5;             // Personal or Team
}

message ProductResponse {
  bool success = 1;
  string error_message = 2;
  ProductMessage product = 3;
}

// --- GetProduct ---

message GetProductRequest {
  string product_id = 1;
  string user_id = 2;
}

// --- ListProducts ---

message ListProductsRequest {
  string user_id = 1;
  int32 skip = 2;
  int32 take = 3;
  bool include_archived = 4;
}

message ListProductsResponse {
  bool success = 1;
  string error_message = 2;
  repeated ProductMessage products = 3;
}

// --- CreateSwimlane ---

message CreateSwimlaneRequest {
  string product_id = 1;
  string user_id = 2;
  string title = 3;
  string color = 4;
}

message SwimlaneResponse {
  bool success = 1;
  string error_message = 2;
  SwimlaneMessage swimlane = 3;
}

// --- CreateWorkItem ---

message CreateWorkItemRequest {
  string swimlane_id = 1;
  string user_id = 2;
  string title = 3;
  string description = 4;
  string priority = 5;        // None, Low, Medium, High, Critical
  string due_date = 6;        // ISO 8601 timestamp or empty
  int32 story_points = 7;
}

message WorkItemResponse {
  bool success = 1;
  string error_message = 2;
  WorkItemMessage work_item = 3;
}

// --- GetWorkItem ---

message GetWorkItemRequest {
  string work_item_id = 1;
  string user_id = 2;
}

// --- MoveWorkItem ---

message MoveWorkItemRequest {
  string work_item_id = 1;
  string user_id = 2;
  string target_swimlane_id = 3;
  double position = 4;
}

// --- Shared Messages ---

message ProductMessage {
  string id = 1;
  string owner_id = 2;
  string title = 3;
  string description = 4;
  string color = 5;
  bool is_archived = 6;
  string etag = 7;
  string created_at = 8;      // ISO 8601 timestamp
  string updated_at = 9;
  int32 swimlane_count = 10;
  int32 item_count = 11;
  int32 member_count = 12;
  string mode = 13;            // Personal or Team
}

message SwimlaneMessage {
  string id = 1;
  string product_id = 2;
  string title = 3;
  double position = 4;
  string color = 5;
  int32 item_limit = 6;       // 0 = no limit
  bool is_archived = 7;
  string created_at = 8;
  string updated_at = 9;
  int32 item_count = 10;
}

message WorkItemMessage {
  string id = 1;
  string swimlane_id = 2;
  string title = 3;
  string description = 4;
  double position = 5;
  string due_date = 6;
  string priority = 7;
  int32 story_points = 8;
  bool is_archived = 9;
  string created_by_user_id = 10;
  string etag = 11;
  string created_at = 12;
  string updated_at = 13;
  int32 comment_count = 14;
  int32 attachment_count = 15;
  int32 checklist_item_count = 16;
  int32 checklist_completed_count = 17;
  repeated string assignee_ids = 18;
  repeated string label_ids = 19;
}

// --- Planning Poker ---

message StartPokerSessionRequest {
  string work_item_id = 1;
  string user_id = 2;
  string scale = 3;            // Fibonacci, TShirt, PowersOfTwo, Custom
  string custom_scale_values = 4;  // JSON array, only when scale=Custom
}

message SubmitPokerVoteRequest {
  string session_id = 1;
  string user_id = 2;
  string estimate = 3;
}

message RevealPokerSessionRequest {
  string session_id = 1;
  string user_id = 2;
}

message AcceptPokerEstimateRequest {
  string session_id = 1;
  string user_id = 2;
  string accepted_estimate = 3;
  int32 story_points = 4;     // 0 = not set
}

message PokerSessionResponse {
  bool success = 1;
  string error_message = 2;
  PokerSessionMessage session = 3;
}

message PokerSessionMessage {
  string id = 1;
  string work_item_id = 2;
  string product_id = 3;
  string created_by_user_id = 4;
  string scale = 5;
  string custom_scale_values = 6;
  string status = 7;
  string accepted_estimate = 8;
  int32 round = 9;
  string created_at = 10;
  string updated_at = 11;
  repeated PokerVoteMessage votes = 12;
}

message PokerVoteMessage {
  string user_id = 1;
  string estimate = 2;        // Empty until revealed
  int32 round = 3;
  string voted_at = 4;
}

// --- Sprint Plan ---

message CreateSprintPlanRequest {
  string product_id = 1;
  string user_id = 2;
  string start_date = 3;       // ISO 8601 date
  int32 sprint_count = 4;
  int32 default_duration_weeks = 5;
}

message GetSprintPlanRequest {
  string product_id = 1;
  string user_id = 2;
}

message AdjustSprintRequest {
  string sprint_id = 1;
  string user_id = 2;
  int32 duration_weeks = 3;
  string start_date = 4;       // Optional, ISO 8601
}

message SprintPlanResponse {
  bool success = 1;
  string error_message = 2;
  SprintPlanOverviewMessage overview = 3;
}

message SprintPlanOverviewMessage {
  string product_id = 1;
  repeated SprintPlanItemMessage sprints = 2;
  int32 total_weeks = 3;
  string plan_start_date = 4;
  string plan_end_date = 5;
}

message SprintPlanItemMessage {
  string id = 1;
  string title = 2;
  string start_date = 3;
  string end_date = 4;
  string status = 5;
  int32 duration_weeks = 6;
  int32 planned_order = 7;
  int32 item_count = 8;
  int32 total_story_points = 9;
}

// --- Review Session ---

message StartReviewSessionRequest {
  string product_id = 1;
  string user_id = 2;
}

message GetReviewSessionRequest {
  string session_id = 1;
  string user_id = 2;
}

message JoinReviewSessionRequest {
  string session_id = 1;
  string user_id = 2;
}

message SetReviewCurrentItemRequest {
  string session_id = 1;
  string user_id = 2;
  string work_item_id = 3;
}

message EndReviewSessionRequest {
  string session_id = 1;
  string user_id = 2;
}

message ReviewSessionResponse {
  bool success = 1;
  string error_message = 2;
  ReviewSessionMessage session = 3;
}

message ReviewSessionMessage {
  string id = 1;
  string product_id = 2;
  string host_user_id = 3;
  string current_work_item_id = 4;
  string status = 5;
  string created_at = 6;
  string ended_at = 7;
  repeated ReviewParticipantMessage participants = 8;
  PokerSessionMessage active_poker_session = 9;
}

message ReviewParticipantMessage {
  string id = 1;
  string user_id = 2;
  string joined_at = 3;
  bool is_connected = 4;
}

// --- Poker Vote Status ---

message GetPokerVoteStatusRequest {
  string session_id = 1;
  string user_id = 2;
}

message PokerVoteStatusResponse {
  bool success = 1;
  string error_message = 2;
  repeated PokerVoteStatusItem statuses = 3;
}

message PokerVoteStatusItem {
  string user_id = 1;
  bool has_voted = 2;
}

// --- Search Integration ---

message GetSearchableDocumentsRequest {
  string user_id = 1;
}

message GetSearchableDocumentRequest {
  string entity_id = 1;
}

message SearchableDocumentResponse {
  bool found = 1;
  SearchableDocument document = 2;
}

message SearchableDocument {
  string module_id = 1;
  string entity_id = 2;
  string entity_type = 3;
  string title = 4;
  string content = 5;
  string summary = 6;
  string owner_id = 7;
  string organization_id = 8;
  string created_at = 9;
  string updated_at = 10;
  map<string, string> metadata = 11;
}
